name: Deploy to Production

on:
  push:
    branches: [prod]

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: ".node-version"
          cache: "pnpm"
          cache-dependency-path: "pnpm-lock.yaml"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test:run

      - name: Run linter (without build artifacts)
        run: rm -rf dist && rm -f hono/static/*.js hono/static/*.js.map && pnpm lint

      - name: Run build
        run: pnpm build

  e2e:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: ".node-version"
          cache: "pnpm"
          cache-dependency-path: "pnpm-lock.yaml"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build JavaScript files
        run: pnpm build

      - name: Run database migrations
        run: pnpm db:migrate

      - name: Seed database
        run: pnpm db:seed

      - name: Run Playwright tests
        env:
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          E2E_GMAIL_ACCOUNT: ${{ secrets.E2E_GMAIL_ACCOUNT }}
          E2E_GMAIL_PASSWORD: ${{ secrets.E2E_GMAIL_PASSWORD }}
        run: pnpm test:e2e

      - name: Upload test artifacts
        uses: actions/upload-artifact@v5
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  deploy:
    needs: [test, e2e]
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: ".node-version"
          cache: "pnpm"
          cache-dependency-path: "pnpm-lock.yaml"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply D1 database migrations
        run: pnpm db:migrate:prod
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Workers
        run: pnpm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Fetch existing deploy tags
        run: git fetch --tags --force

      - name: Create deployment tag and GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG_NAME="deploy-$(date -u +%Y-%m-%d)-$(git rev-parse --short HEAD)-${GITHUB_RUN_ID}"
          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"

          PREVIOUS_TAG=$(git tag -l 'deploy-*' --sort=-creatordate | sed -n '2p' || true)
          if [ -n "$PREVIOUS_TAG" ]; then
            gh release create "$TAG_NAME" --generate-notes --notes-start-tag "$PREVIOUS_TAG" --title "$TAG_NAME"
          else
            gh release create "$TAG_NAME" --generate-notes --title "$TAG_NAME"
          fi
